<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kaizen Yarışması - Metot Ödülü Açıklanması">
    <title>Hisar Hospital | Kaizen Metot Ödülü 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&family=Fredoka:wght@700;900&family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/viewer.css">
    <style>
        /* Custom tweaks for Metot screen */
        .metot-award-banner {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.6rem;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            animation: pulse-glow 2s infinite ease-in-out;
        }
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; text-shadow: 0 0 30px rgba(255, 215, 0, 0.7); }
        }
        .reveal-rank-badge.rank-metot {
            background: linear-gradient(135deg, #0071e3 0%, #00c6ff 100%);
            box-shadow: 0 0 30px rgba(0, 113, 227, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="viewer-container">
        <!-- Ambient particles -->
        <div class="particles" id="particles"></div>
        <div class="grid-overlay"></div>

        <!-- Header -->
        <header class="viewer-header">
            <div class="header-logos">
                <img src="https://hisarhospital.com/wp-content/uploads/2026/04/HH_50x220_pxel.png.webp" alt="Hisar Hospital Logo" class="header-logo-left">
                <div class="header-divider"></div>
                <img src="/logo.png" alt="Kaizen Logo" class="header-logo-right">
            </div>
        </header>

        <!-- Main Stage -->
        <main class="viewer-stage timer-only" id="viewer-stage">
            <!-- Waiting State -->
            <div class="waiting-state" id="waiting-state">
                <div class="waiting-logo-card">
                    <div class="waiting-logo-container">
                        <img src="/logo.png" alt="Kaizen Logo" class="waiting-logo-img">
                    </div>
                    <div class="waiting-visual">
                        <div class="ring ring-1"></div>
                        <div class="ring ring-2"></div>
                        <div class="ring ring-3"></div>
                        <div class="pulse-core"></div>
                    </div>
                </div>
                <p class="waiting-text">Metot Ödülü Sonucu</p>
                <p class="waiting-subtext">Sonucun açıklanması bekleniyor...</p>
            </div>
        </main>

        <!-- Countdown Overlay (hidden by default) -->
        <div class="countdown-overlay hidden" id="countdown-overlay">
            <p class="countdown-rank-label">
                Açıklanacak Ödül: <span style="color: #00c6ff;">METOT ÖDÜLÜ</span>
            </p>
            <div class="countdown-circle">
                <svg class="countdown-ring" width="280" height="280" viewBox="0 0 280 280">
                    <circle class="ring-bg" cx="140" cy="140" r="120" />
                    <circle class="ring-progress" cx="140" cy="140" r="120" id="ring-progress" />
                </svg>
                <span class="countdown-number" id="countdown-number">10</span>
            </div>
            <p class="countdown-subtext">Metot Ödülü hazırlanıyor...</p>
        </div>

        <!-- Reveal Overlay (hidden by default) -->
        <div class="reveal-overlay hidden" id="reveal-overlay">
            <div class="reveal-card" style="max-width: 650px;">
                <div class="metot-award-banner">METOT ÖDÜLÜ KAZANANI</div>
                <div class="reveal-rank-badge rank-metot" id="reveal-rank-badge" style="width: 140px; height: 140px; border-radius: 50%; font-size: 3.5rem; margin-bottom: 2rem;">
                    🏆
                </div>
                <h2 class="reveal-project-name" id="reveal-project-name" style="font-size: 2.2rem; margin-bottom: 0.8rem;">Proje Adı</h2>
                <p class="reveal-project-team" id="reveal-project-team" style="font-size: 1.3rem; color: var(--text-secondary); margin-bottom: 1.5rem;">Ekip Adı</p>
                
                <p style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--primary); font-weight: 700; margin-bottom: 0.3rem;" id="method-criterion-label">Metot Sorusu Puanı</p>
                <div class="reveal-score-display">
                    <span class="reveal-score-value" id="reveal-score-value">0</span>
                    <span class="reveal-score-max" id="reveal-score-max">/25</span>
                </div>
            </div>
        </div>

        <!-- Confetti container -->
        <div class="confetti-container hidden" id="confetti-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="/js/metot.js"></script>
</body>
</html>
