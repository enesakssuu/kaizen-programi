<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kaizen Yarışması - Canlı Skor Tablosu">
    <title>Hisar Hospital | Kaizen Canlı Skor Tablosu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&family=Fredoka:wght@700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/scoreboard.css">
</head>
<body>
    <div class="scoreboard-screen-container">
        <!-- Ambient particles -->
        <div class="particles" id="particles"></div>
        <div class="grid-overlay"></div>

        <!-- Header -->
        <header class="viewer-header">
            <div class="header-logos">
                <img src="https://hisarhospital.com/wp-content/uploads/2026/04/HH_50x220_pxel.png.webp" alt="Hisar Hospital Logo" class="header-logo-left">
                <div class="header-divider"></div>
                <img src="/logo.png" alt="Kaizen Logo" class="header-logo-right">
            </div>
            <h1 class="viewer-title">KAIZEN CANLI SKOR TABLOSU</h1>
            <p class="viewer-subtitle">Grup Değerlendirmeleri</p>
        </header>

        <!-- Main Scoreboard Area -->
        <main class="scoreboard-stage">
            <!-- Summary Stats Board -->
            <div class="scoreboard-summary-stats">
                <div class="stat-box card">
                    <span class="stat-label">Toplam Proje</span>
                    <span class="stat-value" id="stat-total-projects">0</span>
                </div>
                <div class="stat-box card">
                    <span class="stat-label">Aktif Jüri Sayısı</span>
                    <span class="stat-value" id="stat-total-jurors">0</span>
                </div>
                <div class="stat-box card">
                    <span class="stat-label">Toplam Oy Gönderimi</span>
                    <span class="stat-value" id="stat-total-votes">0</span>
                </div>
                <div class="stat-box card">
                    <span class="stat-label">Skor Durumu</span>
                    <span class="stat-value text-accent" id="stat-consensus-label">Hesaplanıyor</span>
                </div>
            </div>

            <!-- Scoreboard Leaderboard Container -->
            <div class="scoreboard-card card">
                <div class="scoreboard-list" id="scoreboard-list">
                    <!-- Dynamically populated rows -->
                </div>
            </div>
        </main>
    </div>

    <script src="/js/scoreboard.js"></script>
</body>
</html>
